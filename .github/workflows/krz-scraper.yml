name: KRZ scraper (obwieszczenia - masa upadłości)

on:
  schedule:
    # codziennie o 06:30 UTC (08:30 czasu polskiego latem, 07:30 zimą)
    - cron: "30 6 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      KRZ_HEADLESS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install selenium openpyxl webdriver-manager

      - name: Run scraper (save to SQLite)
        run: python krz_scraper.py

      - name: Generate Excel from DB
        run: python generate_excel.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obwieszczenia-${{ github.run_id }}
          path: |
            obwieszczenia.db
            obwieszczenia_masa_upadlosci.xlsx
          if-no-files-found: warn
          retention-days: 30

      - name: Commit results to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add obwieszczenia.db obwieszczenia_masa_upadlosci.xlsx
          if ! git diff --cached --quiet; then
            git commit -m "chore(data): daily KRZ scrape $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
